[phases.setup]
aptPkgs = ["php8.2-gd", "php8.2-mysql", "php8.2-mbstring", "php8.2-xml", "php8.2-bcmath", "php8.2-curl", "php8.2-zip"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-gd"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"